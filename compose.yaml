name: hr-automatization-project

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: spk_hr
      POSTGRES_USER: spk
      POSTGRES_PASSWORD: spk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spk -d spk_hr"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - spk-postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      args:
        VITE_API_URL: /api/v1
    environment:
      SPK_DATABASE_URL: postgresql+psycopg://spk:spk@postgres:5432/spk_hr
      SPK_ENVIRONMENT: development
      SPK_DEV_AUTH_ENABLED: "true"
      SPK_DEV_DEFAULT_USER: admin
      SPK_SENSITIVE_DATA_KEY: Y2Ij-yv_7CnluYWbVrE0Cakluy1JLmVWPwqH7E8qlRY=
      SPK_CORS_ORIGINS: http://localhost:${APP_PORT:-5173}
    ports:
      - "${APP_PORT:-5173}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  spk-postgres-data:

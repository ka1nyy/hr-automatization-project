name: spk-corporate-system

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: spk_hr
      POSTGRES_USER: spk
      POSTGRES_PASSWORD: spk
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spk -d spk_hr"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - spk-postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      SPK_DATABASE_URL: postgresql+psycopg://spk:spk@postgres:5432/spk_hr
      SPK_ENVIRONMENT: development
      SPK_DEV_AUTH_ENABLED: "true"
      SPK_DEV_DEFAULT_USER: admin
      SPK_SENSITIVE_DATA_KEY: Y2Ij-yv_7CnluYWbVrE0Cakluy1JLmVWPwqH7E8qlRY=
      SPK_CORS_ORIGINS: http://localhost:5173
    command: ["sh", "-c", "alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

volumes:
  spk-postgres-data:
